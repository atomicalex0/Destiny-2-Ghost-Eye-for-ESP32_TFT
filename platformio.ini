; PlatformIO Project Configuration File - use pioarduino for best results!
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:waveshare_esp32s3_touch_lcd_128]
platform = espressif32
board = waveshare_esp32s3_touch_lcd_128
framework = arduino
build_flags = 
	-DBOARD_HAS_PSRAM
	-DUSE_HSPI_PORT
	-Os
	-DUSER_SETUP_LOADED=1
	
	-DGC9A01_DRIVER=1
	-DTFT_SPI_PORT=1
	-DTFT_WIDTH=240
	-DTFT_HEIGHT=240
	-DTFT_MOSI=11
	-DTFT_SCLK=10
	-DTFT_CS=9
	-DTFT_DC=8
	-DTFT_RST=12
	-DTFT_BL=40
	-DTFT_BACKLIGHT_ON=HIGH
	
	-DLOAD_GLCD=1   # Font 1. Original Adafruit 8 pixel font needs ~1820 bytes in FLASH
	-DLOAD_FONT2=1  # Font 2. Small 16 pixel high font, needs ~3534 bytes in FLASH, 96 characters
	-DLOAD_FONT4=1  # Font 4. Medium 26 pixel high font, needs ~5848 bytes in FLASH, 96 characters
	-DLOAD_GFXFF=1  # FreeFonts. Include access to the 48 Adafruit_GFX free fonts FF1 to FF48 and custom fonts
	
	-DSMOOTH_FONT=1
	
	-DSPI_FREQUENCY=27000000
	-DSPI_READ_FREQUENCY=5000000
build_type = debug
monitor_speed = 115200
monitor_filters = esp32_exception_decoder
lib_deps = bodmer/TFT_eSPI @ ^2.5.43
